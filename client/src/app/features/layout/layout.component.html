<div class="layout">
  <!-- Hamburger Menu Button (mobile only) -->
  <button class="hamburger-menu" (click)="toggleSidebar()" aria-label="Open navigation menu" [attr.aria-expanded]="isSidebarOpen">
    <span class="bar"></span>
    <span class="bar"></span>
    <span class="bar"></span>
  </button>

  <!-- Overlay (mobile only) -->
  <div class="sidebar-overlay" *ngIf="isSidebarOpen" (click)="closeSidebar()" aria-hidden="true"></div>

  <!-- Sidebar -->
  <aside class="sidebar" [class.open]="isSidebarOpen">
    <!-- Close button (mobile only) -->
    <button class="close-btn" (click)="closeSidebar()" aria-label="Close navigation menu">&#10005;</button>

    <div class="top">
      <div class="logo-container">
        <img [src]="logoPath" alt="SettleUp Logo" class="logo-img" [class.hidden]="!logoLoaded" (load)="onLogoLoad()" (error)="onLogoError()">
        <span *ngIf="!logoLoaded" class="logo-fallback">&#8377;</span>
        <span class="logo-text">SettleUp</span>
      </div>
      <nav>
        <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeSidebar()">
          <span class="nav-icon">🏠</span>Dashboard
        </a>
        <a routerLink="/groups" routerLinkActive="active" (click)="closeSidebar()">
          <span class="nav-icon">👥</span>Groups
        </a>
        <a routerLink="/expenses" routerLinkActive="active" (click)="closeSidebar()">
          <span class="nav-icon">💳</span>Expenses
        </a>
        <a routerLink="/balances" routerLinkActive="active" (click)="closeSidebar()">
          <span class="nav-icon">⚖️</span>Balances
        </a>
        <a routerLink="/settlements" routerLinkActive="active" (click)="closeSidebar()">
          <span class="nav-icon">📊</span>Settlements
        </a>
      </nav>
    </div>

    <!-- bottom profile -->
    <div class="bottom">
      <div class="profile">
        <div class="avatar">{{ user.avatar || getInitials(user.name) }}</div>
        <div class="profile-info">
          <div class="name">{{ user.name || 'Guest' }}</div>
          <div class="email">{{ user.email || 'guest@example.com' }}</div>
        </div>
      </div>
      <button class="settings-btn" (click)="goToSettings()" aria-label="Settings">
        <span class="nav-icon">⚙️</span>Settings
      </button>
      <button class="logout" (click)="logout()" aria-label="Log out">
        <span class="nav-icon">🚪</span>Log Out
      </button>
    </div>
  </aside>

  <!-- Content -->
  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
